schema_version: 1

# ─── Topics ───────────────────────────────────────────────────────────
# Canonical topic names with aliases.
# When a tool extracts "DR" or "disaster recovery planning",
# it normalizes to "Disaster Recovery".
# Target: 50-80 terms. Grows organically. Review monthly.

topics:
  - name: "Disaster Recovery"
    aliases: ["DR", "DRP", "disaster recovery planning", "business continuity", "BC/DR"]

  - name: "SLA"
    aliases: ["Service Level Agreement", "Service Level Agreements", "SLAs", "service levels"]

  - name: "SaaS Architecture"
    aliases: ["SaaS platform", "SaaS Platform", "cloud architecture", "platform architecture"]

  - name: "Technical Account Manager"
    aliases: ["TAM", "account manager", "technical account management"]

  - name: "WMS"
    aliases: ["Warehouse Management System", "Warehouse Management", "warehouse management"]

  - name: "TMS"
    aliases: ["Transportation Management System", "Transportation Management"]

  - name: "OMS"
    aliases: ["Order Management System", "Order Management"]

  - name: "Demand Planning"
    aliases: ["demand forecasting", "forecasting", "demand management"]

  - name: "Supply Chain Planning"
    aliases: ["SCP", "supply chain", "planning solutions"]

  - name: "ISO Certifications"
    aliases: ["ISO 27001", "ISO 22301", "ISO 27701", "SOC 2", "compliance certifications"]

  - name: "Non-Production Environments"
    aliases: ["non-prod", "sandbox", "test environments", "staging"]

  - name: "Incident Management"
    aliases: ["incident response", "severity levels", "ITSM"]

  - name: "Workforce Management"
    aliases: ["WFM", "workforce planning", "labor management"]

  - name: "Network Optimization"
    aliases: ["network design", "supply chain network", "network planning"]

  - name: "Replenishment"
    aliases: ["inventory replenishment", "auto-replenishment", "replenishment planning"]

  - name: "Control Tower"
    aliases: ["supply chain visibility", "end-to-end visibility", "E2E visibility"]

  - name: "API Integration"
    aliases: ["API", "REST API", "integration", "microservices"]

  - name: "Data Migration"
    aliases: ["migration", "data conversion", "ETL", "data loading"]

  - name: "Performance Optimization"
    aliases: ["performance tuning", "scalability", "throughput"]

  - name: "Security"
    aliases: ["cybersecurity", "information security", "infosec", "NIS2"]

  - name: "Change Management"
    aliases: ["change control", "release management"]

  - name: "Implementation"
    aliases: ["go-live", "deployment", "rollout", "cutover"]

  - name: "Pricing"
    aliases: ["commercial", "licensing", "subscription model", "TCO"]

  - name: "Competitive Analysis"
    aliases: ["competitive positioning", "competitor", "market comparison"]

  - name: "Customer Success"
    aliases: ["customer engagement", "adoption", "value realization"]

  - name: "Workflow Orchestration"
    aliases: ["workflow engine", "business rules", "automation"]

  - name: "Machine Learning"
    aliases: ["ML", "AI/ML", "predictive analytics", "forecasting models"]

  - name: "Cloud Infrastructure"
    aliases: ["Azure", "cloud deployment", "multi-region", "cloud hosting"]

# ─── Products ─────────────────────────────────────────────────────────
# Blue Yonder product portfolio. Normalized names.

products:
  - name: "Blue Yonder Platform"
    aliases: ["BY Platform", "Yonder platform", "the platform", "Luminate Platform"]

  - name: "Blue Yonder WMS"
    aliases: ["BY WMS", "Dispatcher WMS", "warehouse management system"]

  - name: "Blue Yonder TMS"
    aliases: ["BY TMS", "transportation management"]

  - name: "Blue Yonder OMS"
    aliases: ["BY OMS", "order management"]

  - name: "Blue Yonder Demand Planning"
    aliases: ["BY Demand", "Luminate Demand"]

  - name: "Blue Yonder Supply Planning"
    aliases: ["BY Supply", "Luminate Supply"]

  - name: "Blue Yonder Workforce Management"
    aliases: ["BY WFM", "Workforce Management"]

  - name: "Blue Yonder Control Tower"
    aliases: ["BY Control Tower", "Luminate Control Tower"]

  - name: "Blue Yonder Commerce"
    aliases: ["BY Commerce", "Luminate Commerce"]

  - name: "Blue Yonder Network Design"
    aliases: ["BY Network", "network optimization tool"]

  - name: "Azure"
    aliases: ["Microsoft Azure", "Azure cloud"]

# ─── Document Types ───────────────────────────────────────────────────
# Standardized across all tools.

document_types:
  - "presentation"
  - "meeting"
  - "training"
  - "demo"
  - "workshop"
  - "rfp"
  - "contract"
  - "email"
  - "notes"
  - "document"
  - "report"
  - "tutorial"
  - "security_questionnaire"

# ─── Term Normalization ──────────────────────────────────────────────
# Simple find-replace applied to ALL text fields before taxonomy matching.

term_normalization:
  "Yonder": "Blue Yonder"
  "BY Platform": "Blue Yonder Platform"
  "BY ": "Blue Yonder "
  "JDA": "Blue Yonder (formerly JDA)"

# ─── Cardinality Caps ────────────────────────────────────────────────
# Enforced during validation. Truncate to max, warn.

caps:
  topics: 8
  products: 4
  people: 3
