schema_version: 1

# ─── Topics ───────────────────────────────────────────────────────────
# Canonical topic names with aliases.
# When a tool extracts "DR" or "disaster recovery planning",
# it normalizes to "Disaster Recovery".
# Target: 50-80 terms. Grows organically. Review monthly.

topics:
  - name: "Disaster Recovery"
    aliases: ["DR", "DRP", "disaster recovery planning", "business continuity", "BC/DR"]

  - name: "SLA"
    aliases: ["Service Level Agreement", "Service Level Agreements", "SLAs", "service levels"]

  - name: "SaaS Architecture"
    aliases: ["SaaS", "SaaS platform", "SaaS Platform", "cloud architecture", "platform architecture"]

  - name: "Technical Account Manager"
    aliases: ["TAM", "account manager", "technical account management"]

  - name: "WMS"
    aliases: ["Warehouse Management System", "Warehouse Management", "warehouse management"]

  - name: "TMS"
    aliases: ["Transportation Management System", "Transportation Management"]

  - name: "OMS"
    aliases: ["Order Management System", "Order Management"]

  - name: "Demand Planning"
    aliases: ["demand forecasting", "forecasting", "demand management"]

  - name: "Supply Chain Planning"
    aliases: ["SCP", "supply chain", "planning solutions"]

  - name: "ISO Certifications"
    aliases: ["ISO 27001", "ISO 22301", "ISO 27701", "SOC 2", "compliance certifications"]

  - name: "Non-Production Environments"
    aliases: ["non-prod", "sandbox", "test environments", "staging"]

  - name: "Incident Management"
    aliases: ["incident response", "severity levels", "ITSM"]

  - name: "Workforce Management"
    aliases: ["WFM", "workforce planning", "labor management"]

  - name: "Network Optimization"
    aliases: ["network design", "supply chain network", "network planning"]

  - name: "Replenishment"
    aliases: ["inventory replenishment", "auto-replenishment", "replenishment planning"]

  - name: "Control Tower"
    aliases: ["supply chain visibility", "end-to-end visibility", "E2E visibility"]

  - name: "API Integration"
    aliases: ["API", "REST API", "integration", "microservices"]

  - name: "Data Migration"
    aliases: ["migration", "data conversion", "ETL", "data loading"]

  - name: "Performance Optimization"
    aliases: ["performance tuning", "scalability", "throughput"]

  - name: "Security"
    aliases: ["cybersecurity", "information security", "infosec", "NIS2"]

  - name: "Change Management"
    aliases: ["change control", "release management"]

  - name: "Implementation"
    aliases: ["go-live", "deployment", "rollout", "cutover"]

  - name: "Pricing"
    aliases: ["commercial", "licensing", "subscription model", "TCO"]

  - name: "Competitive Analysis"
    aliases: ["competitive positioning", "competitor", "market comparison"]

  - name: "Customer Success"
    aliases: ["customer engagement", "adoption", "value realization"]

  - name: "Workflow Orchestration"
    aliases: ["workflow engine", "business rules", "automation"]

  - name: "Machine Learning"
    aliases: ["ML", "AI/ML", "predictive analytics", "forecasting models"]

  - name: "Cloud Infrastructure"
    aliases: ["Azure", "cloud deployment", "multi-region", "cloud hosting"]

# ─── Products ─────────────────────────────────────────────────────────
# Blue Yonder product portfolio. Normalized names.

products:
  - name: "Blue Yonder Platform"
    aliases: ["BY Platform", "Yonder platform", "the platform", "Luminate Platform"]

  - name: "Blue Yonder WMS"
    aliases: ["BY WMS", "Dispatcher WMS", "warehouse management system"]

  - name: "Blue Yonder TMS"
    aliases: ["BY TMS", "transportation management"]

  - name: "Blue Yonder OMS"
    aliases: ["BY OMS", "order management"]

  - name: "Blue Yonder Demand Planning"
    aliases: ["BY Demand", "Luminate Demand"]

  - name: "Blue Yonder Supply Planning"
    aliases: ["BY Supply", "Luminate Supply"]

  - name: "Blue Yonder Workforce Management"
    aliases: ["BY WFM", "Workforce Management"]

  - name: "Blue Yonder Control Tower"
    aliases: ["BY Control Tower", "Luminate Control Tower"]

  - name: "Blue Yonder Commerce"
    aliases: ["BY Commerce", "Luminate Commerce"]

  - name: "Blue Yonder Network Design"
    aliases: ["BY Network", "network optimization tool"]

  - name: "Azure"
    aliases: ["Microsoft Azure", "Azure cloud"]

# ─── Document Types ───────────────────────────────────────────────────
# Standardized across all tools.

document_types:
  - "presentation"
  - "meeting"
  - "training"
  - "demo"
  - "workshop"
  - "rfp"
  - "contract"
  - "email"
  - "notes"
  - "document"
  - "report"
  - "tutorial"
  - "security_questionnaire"

# ─── Term Normalization ──────────────────────────────────────────────
# Simple find-replace applied to ALL text fields before taxonomy matching.

term_normalization:
  "Yonder": "Blue Yonder"
  "BY Platform": "Blue Yonder Platform"
  "BY ": "Blue Yonder "
  "JDA": "Blue Yonder (formerly JDA)"

# ─── Knowledge Domains ───────────────────────────────────────────────
# 8 domains covering the full business value chain.
# Every note gets 1-3 domains. Domains are broad; topics provide granularity.
# "Strategy" is a TOPIC, not a domain — earns domain status at 30+ notes.

domains:
  - name: "Product"
    aliases: ["product management", "roadmap", "capabilities", "releases", "packaging", "product strategy"]
    description: "What we build — roadmap, capabilities, packaging, releases"

  - name: "Platform & Architecture"
    aliases: ["platform", "architecture", "cloud", "security", "integration", "data", "infrastructure", "observability", "technical architecture"]
    description: "Cloud, security, integration, data, observability"

  - name: "Delivery & Implementation"
    aliases: ["delivery", "implementation", "go-live", "methodology", "project management", "deployment", "cutover", "estimation"]
    description: "How we deliver — methodology, estimations, risks, go-live"

  - name: "Customer Success"
    aliases: ["customer success", "CS", "adoption", "renewals", "support", "escalation", "value realization", "retention"]
    description: "Adoption, renewals, support, escalation, value realization"

  - name: "Go-to-Market"
    aliases: ["GTM", "go to market", "sales", "marketing", "pre-sales", "presales", "partner ecosystem", "analyst relations", "positioning"]
    description: "Sales motions, marketing, pre-sales, partner ecosystem"

  - name: "Commercials"
    aliases: ["commercial", "pricing", "licensing", "SKU", "SKUs", "contracts", "deal mechanics", "TCO", "subscription model", "discounting"]
    description: "Pricing, licensing, SKUs, contracts, deal mechanics"

  - name: "Competitive"
    aliases: ["competitive", "competitor", "win/loss", "differentiators", "competitive positioning", "landmines", "battle cards"]
    description: "Positioning, win/loss, differentiators, landmines"

  - name: "Industry & Supply Chain"
    aliases: ["industry", "vertical", "supply chain", "logistics", "planning", "execution", "optimization", "retail", "manufacturing", "CPG", "pharma", "FMCG", "S&OP", "SIOP"]
    description: "Verticals + domain concepts — planning, execution, optimization"

# ─── Source Types ─────────────────────────────────────────────────────
# Where the knowledge came from. Replaces overlap between old 'type' field
# and proposed 'source_type'. Tools set this based on input context.

source_types:
  - "opportunity"
  - "rfp"
  - "meeting"
  - "training"
  - "documentation"
  - "release_note"
  - "research"
  - "internal_update"

# ─── Layers ───────────────────────────────────────────────────────────
# Operational = doing my job. Learning = understanding the business. Reference = reusable assets.

layers:
  - "operational"
  - "learning"
  - "reference"

# ─── Confidentiality ─────────────────────────────────────────────────
# MANDATORY on every note. Defaults to "internal" if not specified.

confidentiality_levels:
  - "public"           # Can share externally
  - "internal"         # Blue Yonder internal only (DEFAULT)
  - "confidential"     # Client-specific, NDA-protected
  - "restricted"       # M&A, non-public pricing, security artifacts

# ─── Authority ────────────────────────────────────────────────────────
# How trustworthy is this information?

authority_levels:
  - "authoritative"    # Official docs, signed RFPs, product specs
  - "approved"         # Reviewed presentations, validated answers
  - "tribal"           # Meeting notes, hallway conversations, inferences (DEFAULT)

# ─── Temporal Validity Rules ──────────────────────────────────────────
# Auto-calculated valid_to based on domain. Tools use this matrix.
# Notes in 02_sources/ are immutable — validity applies to 03_playbooks/ and 04_evergreen/.

validity_matrix:
  "Commercials": 90          # days — pricing changes fast
  "Competitive": 90          # competitor landscape shifts
  "Platform & Architecture": 180
  "Product": 180
  "Go-to-Market": 180
  "Delivery & Implementation": 365
  "Customer Success": 365
  "Industry & Supply Chain": null   # no expiry — domain concepts are stable

# ─── Cardinality Caps ────────────────────────────────────────────────
# Enforced during validation. Truncate to max, warn.

caps:
  topics: 8
  products: 4
  people: 3
  domains: 3
